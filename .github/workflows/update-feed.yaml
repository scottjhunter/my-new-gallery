name: Update Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

concurrency:
  group: update-feed
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build feed data
        run: npm run build:feed

      - name: Commit and push if changed
        run: |
          if git diff --quiet src/_data/feed.json; then
            echo "No feed changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/_data/feed.json
          git commit -m "chore(feed): refresh curated feed"
          git pull --rebase origin master
          git push
